name: Build & Submit

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      region:
        description: 'Region to build (jo, eg, or both)'
        required: true
        default: 'both'
        type: choice
        options:
          - jo
          - eg
          - both

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        region: [jo, eg]
        platform: [ios, android]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build
        run: eas build --profile production-${{ matrix.region }} --platform ${{ matrix.platform }} --non-interactive

      - name: Submit
        if: github.ref == 'refs/heads/main'
        run: eas submit --profile production-${{ matrix.region }} --platform ${{ matrix.platform }} --non-interactive
